area:
  id: evals
  label: "Evals & Observability"
  color: sky
  order: 8
  blurb: >
    How you know whether the agent is working. Task evals, trajectory
    evals, LLM-as-judge, regression discipline, tracing, the current
    observability tools, and the cost/latency dashboards that surface
    problems before users do.

nodes:
  - id: evals.why-evals-are-hard
    label: "Why agent evals are different"
    tier: core
    summary: >
      Non-determinism, multi-step trajectories, partial credit, no clean
      labels. Most traditional ML eval intuition is wrong for agents.
    competent_means: >
      Can explain to a backend engineer why a unit-test mindset doesn't
      transfer, and name three properties of agent eval that need to be
      designed for.
    depends_on: [foundations.what-is-a-harness]
    related: []
    aliases: [agent eval, llm eval, evaluation]
    resources:
      - title: "Evaluating LLM Agents: A Deep Dive"
        author: "Hamel Husain"
        year: 2024
        type: post
        link: "https://hamel.dev/blog/posts/evals/"
        why: >
          The most practitioner-grade essay on agent eval — frames it as
          a discipline rather than a metric. The "look at your data"
          framing is durable.
        difficulty: intermediate
        cost: free
        durability: durable
        verified: pending

  - id: evals.task-evals
    label: "Task-level evals"
    tier: core
    summary: >
      End-to-end task success. A rubric, a held-out set, a pass rate.
      The eval you need before any of the fancier ones.
    competent_means: >
      Has a written rubric for their agent's primary task and a
      held-out set they didn't pick from training prompts.
    depends_on: [evals.why-evals-are-hard]
    related: [evals.regression]
    aliases: [end-to-end eval, task success]
    resources:
      - title: "A Field Guide to Rapidly Improving AI Products"
        author: "Hamel Husain"
        year: 2024
        type: post
        link: "https://hamel.dev/blog/posts/field-guide/"
        why: >
          The clearest "build the eval before you build the feature"
          discipline in the literature. Walks through task-level eval
          design with worked examples.
        difficulty: intermediate
        cost: free
        durability: durable
        verified: pending

  - id: evals.trajectory-evals
    label: "Trajectory / process evals"
    tier: recommended
    summary: >
      Scoring intermediate steps, not just final outputs. Catches the
      regression where the agent gets the right answer for the wrong
      reason.
    competent_means: >
      Has caught at least one regression that task-level eval missed
      because the agent reached the answer via a broken path.
    depends_on: [evals.task-evals]
    related: [evals.tracing]
    aliases: [process eval, step eval, intermediate eval]
    resources:
      - title: "Tau-Bench: A Benchmark for Tool-Agent-User Interaction in Real-World Domains"
        author: "Yao et al."
        year: 2024
        type: paper
        link: "https://arxiv.org/abs/2406.12045"
        why: >
          The clearest example of trajectory-aware benchmarking. The
          design (multi-step, tool-use, partial credit) sets the
          template for how to think about trajectory evals.
        difficulty: advanced
        cost: free
        durability: durable
        verified: pending

  - id: evals.llm-as-judge
    label: "LLM-as-judge"
    tier: core
    summary: >
      Using a model to grade a model. Cheap and scalable; calibration
      and bias are the catches. A judge is a model — eval it.
    competent_means: >
      Knows three ways judges fail (position bias, verbosity bias,
      self-preference) and the human spot-check rate they use to keep
      the judge honest.
    depends_on: [evals.task-evals]
    related: [loop.reflexion]
    aliases: [llm judge, model as judge, judge model]
    resources:
      - title: "Judging LLM-as-a-Judge with MT-Bench and Chatbot Arena"
        author: "Zheng et al."
        year: 2023
        type: paper
        link: "https://arxiv.org/abs/2306.05685"
        why: >
          The paper that established LLM-as-judge as a discipline.
          Section 3 is required reading on the bias catalogue.
        difficulty: intermediate
        cost: free
        durability: durable
        verified: pending

  - id: evals.regression
    label: "Regression eval & golden sets"
    tier: core
    summary: >
      Locking in behavior. Your eval set is your test suite — every PR
      runs it; regressions block merges.
    competent_means: >
      Their PR pipeline blocks on agent eval regressions. Has caught a
      regression in CI rather than in production.
    depends_on: [evals.task-evals]
    related: [patterns.eval-driven-loop]
    aliases: [golden set, regression suite, eval ci]
    resources:
      - title: "Evaluating LLM Agents: A Deep Dive"
        author: "Hamel Husain"
        year: 2024
        type: post
        link: "https://hamel.dev/blog/posts/evals/"
        why: >
          Treats regression discipline as the single biggest reliability
          lever for agents. The framing transfers directly to a PR
          pipeline.
        difficulty: intermediate
        cost: free
        durability: durable
        verified: pending

  - id: evals.tracing
    label: "Tracing & structured logs"
    tier: core
    summary: >
      Per-turn traces, OpenTelemetry-style spans, replayable runs. The
      observability surface that makes everything else debuggable.
    competent_means: >
      Can debug a failed agent run from traces alone, without having
      seen it happen in real time.
    depends_on: [evals.why-evals-are-hard]
    related: [evals.observability-tools]
    aliases: [agent tracing, observability, telemetry]
    resources:
      - title: "OpenTelemetry GenAI Conventions"
        author: "OpenTelemetry"
        year: 2024
        type: spec
        link: "https://opentelemetry.io/docs/specs/semconv/gen-ai/"
        why: >
          The emerging standard for instrumenting agent calls. Durable
          even as specific vendors come and go — the spec is the layer
          everyone implements against.
        difficulty: intermediate
        cost: free
        durability: durable
        verified: pending

  - id: evals.observability-tools
    label: "Observability tools (current)"
    tier: recommended
    summary: >
      Langfuse, AgentOps, LangSmith, Laminar — the current crop.
      durability:current because most of these names will rotate; the
      capabilities they offer will not.
    competent_means: >
      Knows the four capabilities they actually want (trace search,
      replay, eval integration, cost dashboard) and can pick a tool by
      capability, not by brand.
    depends_on: [evals.tracing]
    related: [evals.cost-latency-dashboards]
    aliases: [langfuse, agentops, langsmith, observability vendors]
    resources:
      - title: "AgentOps"
        author: "AgentOps team"
        year: 2024
        type: repo
        link: "https://github.com/AgentOps-AI/agentops"
        why: >
          One representative current tool. Open-source, integrates with
          most agent frameworks. Listed as example of the category, not
          a recommendation against alternatives.
        difficulty: intermediate
        cost: freemium
        durability: current
        verified: pending

  - id: evals.cost-latency-dashboards
    label: "Cost & latency dashboards"
    tier: recommended
    summary: >
      The "is this agent affordable to run" view. $ per task, p50/p99
      latency, cache-hit rate.
    competent_means: >
      Their agent has a $/task dashboard and a p50/p99 latency
      dashboard — both updated on every deploy.
    depends_on: [evals.tracing, cost.tracking]
    related: []
    aliases: [cost dashboard, latency monitoring, agent metrics]
    resources:
      - title: "Building effective agents"
        author: "Anthropic"
        year: 2024
        type: post
        link: "https://www.anthropic.com/research/building-effective-agents"
        why: >
          The "measure cost and latency from day one" guidance is
          unusually direct — most agent posts skip this. Durable.
        difficulty: intermediate
        cost: free
        durability: durable
        verified: pending
