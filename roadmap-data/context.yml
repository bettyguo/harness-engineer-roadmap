area:
  id: context
  label: "Context Engineering"
  color: rose
  order: 4
  blurb: >
    Karpathy's term for filling the context window with the right
    information for the next step. Window budgeting, structured prompts,
    compaction, position bias, long-context pitfalls, and the poisoning
    surface.

nodes:
  - id: context.window-budget
    label: "Context-window budgeting"
    tier: core
    summary: >
      Token accounting, headroom, ceiling effects. Most "I'll just put
      everything in" agents are bad budgets, not bad prompts.
    competent_means: >
      Can sketch a per-turn token budget for a real agent on the back of
      a napkin and identify which item is the worst-offending bloater.
    depends_on: [foundations.what-is-a-harness]
    related: [cost.short-vs-long-context]
    aliases: [context budget, token budget, context window]
    resources:
      - title: "Context engineering for agents"
        author: "LangChain"
        year: 2025
        type: post
        link: "https://www.langchain.com/blog/context-engineering-for-agents"
        why: >
          The clearest practitioner-grade overview of context budgeting
          as a first-class design problem. Vendor-flavored but the
          concepts transfer.
        difficulty: intermediate
        cost: free
        durability: durable
        verified: "yes"
        verified_at: "2026-05-14"

  - id: context.system-prompts
    label: "System-prompt design"
    tier: core
    summary: >
      Persona, rules, output shape, and what NOT to put in the system
      prompt. The system prompt is a cache-key in most production setups
      — design it accordingly.
    competent_means: >
      Can audit a system prompt and cut 30% without behavior loss; knows
      what should never live in the system prompt (per-user, per-task
      content).
    depends_on: [context.window-budget]
    related: [cost.caching]
    aliases: [system message, instructions, persona]
    resources:
      - title: "Prompt engineering — Anthropic docs"
        author: "Anthropic"
        year: 2024
        type: spec
        link: "https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/overview"
        why: >
          Current-tool example — vendor docs, but the structural advice
          (be specific, use examples, define output shape) is durable
          and one of the few that addresses system-prompt design
          explicitly.
        difficulty: beginner
        cost: free
        durability: current
        verified: "yes"
        verified_at: "2026-05-14"

  - id: context.compaction
    label: "Compaction & summarization"
    tier: core
    summary: >
      Auto-compact, sliding windows, hierarchical summaries. Lossy by
      design — the discipline is knowing which signal you're allowed to
      lose.
    competent_means: >
      Knows three things compaction can drop without harm and three
      things it can never drop. Has a metric for compaction-induced
      regression.
    depends_on: [context.window-budget]
    related: [memory.forgetting]
    aliases: [auto-compact, summarization, conversation compression]
    resources:
      - title: "Long-Context Window Engineering Patterns"
        author: "Anthropic"
        year: 2025
        type: post
        link: "https://docs.anthropic.com/en/docs/build-with-claude/context-windows"
        why: >
          Vendor docs, durable principles — covers compaction patterns
          and when they preserve vs destroy load-bearing context.
        difficulty: intermediate
        cost: free
        durability: current
        verified: "yes"
        verified_at: "2026-05-14"

  - id: context.relevance-filtering
    label: "Relevance filtering & pruning"
    tier: recommended
    summary: >
      Trim noisy tool outputs before they hit the next turn. Most context
      problems are too-much-noise, not too-little-signal.
    competent_means: >
      Can show a before/after where filtering tool returns raised
      accuracy without changing the model or the prompt.
    depends_on: [context.window-budget]
    related: [context.position-bias]
    aliases: [context pruning, output filtering]
    resources:
      - title: "Context engineering for agents"
        author: "LangChain"
        year: 2025
        type: post
        link: "https://www.langchain.com/blog/context-engineering-for-agents"
        why: >
          Discusses output-filtering as a routine harness practice — the
          framing of "prune what the model doesn't need" is durable even
          as the example tools rotate.
        difficulty: intermediate
        cost: free
        durability: durable
        verified: "yes"
        verified_at: "2026-05-14"

  - id: context.position-bias
    label: "Position bias & ordering"
    tier: recommended
    summary: >
      Lost-in-the-middle, recency bias, primacy bias. Models attend to
      the start and the end of context more than the middle.
    competent_means: >
      Can demo position bias on a current model with a runnable example
      and design the prompt to put the load-bearing item where the model
      will attend.
    depends_on: [context.window-budget]
    related: []
    aliases: [lost in the middle, attention bias]
    resources:
      - title: "Lost in the Middle: How Language Models Use Long Contexts"
        author: "Liu et al."
        year: 2023
        type: paper
        link: "https://arxiv.org/abs/2307.03172"
        why: >
          The paper that named the effect. Read sections 3–4; the
          U-shape attention curve is the durable insight, not the
          specific numbers (which improve with new models).
        difficulty: intermediate
        cost: free
        durability: durable
        verified: "yes"
        verified_at: "2026-05-14"

  - id: context.structured-context
    label: "Structured context (XML, tags, sections)"
    tier: core
    summary: >
      Anthropic-style XML, OpenAI-style sections. Structure isn't
      cosmetic — it changes compliance with output and ordering rules.
    competent_means: >
      Can refactor a flat prompt to structured (named sections, explicit
      output schema) and explain the compliance gain.
    depends_on: [context.system-prompts]
    related: [reliability.structured-output]
    aliases: [xml prompts, structured prompts, prompt sections]
    resources:
      - title: "Use XML tags to structure your prompts"
        author: "Anthropic"
        year: 2024
        type: spec
        link: "https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/use-xml-tags"
        why: >
          Vendor docs (durability:current), but the technique itself is
          durable and transfers to any model — XML, JSON-fenced
          sections, or markdown headers all work.
        difficulty: beginner
        cost: free
        durability: current
        verified: "yes"
        verified_at: "2026-05-14"

  - id: context.long-context-pitfalls
    label: "Long-context pitfalls"
    tier: recommended
    summary: >
      1M-token windows aren't free: latency, attention dilution, cost.
      Long context is a tool, not a default.
    competent_means: >
      Knows when not to use long context (when retrieval would do; when
      attention dilution would dominate; when latency budget says no).
    depends_on: [context.window-budget]
    related: [cost.caching]
    aliases: [long context, million-token]
    resources:
      - title: "Lost in the Middle: How Language Models Use Long Contexts"
        author: "Liu et al."
        year: 2023
        type: paper
        link: "https://arxiv.org/abs/2307.03172"
        why: >
          The clearest empirical evidence that long context isn't a free
          win. Cite this in any "why don't we just put it all in?"
          argument.
        difficulty: intermediate
        cost: free
        durability: durable
        verified: "yes"
        verified_at: "2026-05-14"

  - id: context.context-poisoning
    label: "Context poisoning"
    tier: core
    summary: >
      Bad data in context cascades. Untrusted text from tool outputs,
      retrieved docs, or user input can manipulate downstream reasoning.
    competent_means: >
      Can name three ways context gets poisoned (indirect injection,
      retrieved-doc takeover, error-loop poisoning) and the trace
      pattern to catch each.
    depends_on: [context.window-budget]
    related: [security.prompt-injection]
    aliases: [context contamination, indirect injection]
    resources:
      - title: "Prompt Injection: What's the worst that can happen?"
        author: "Simon Willison"
        year: 2023
        type: post
        link: "https://simonwillison.net/2023/Apr/14/worst-that-can-happen/"
        why: >
          The clearest non-academic walk-through of the attack surface,
          including the context-poisoning angle. Required reading.
        difficulty: beginner
        cost: free
        durability: durable
        verified: "yes"
        verified_at: "2026-05-14"
