name: file-stale-link-issues

# After the nightly linkcheck, walks .linkcheck-report.json and opens
# (or updates) a `stale-link` issue per broken link. Soft-mode by design
# so the workflow itself never fails — issues are the contract.

on:
  workflow_run:
    workflows: [linkcheck]
    types: [completed]

permissions:
  contents: read
  issues: write

jobs:
  file:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure'
    steps:
      - uses: actions/checkout@v4

      - name: Download linkcheck report
        uses: actions/download-artifact@v4
        with:
          name: linkcheck-report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Open / update issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '.linkcheck-report.json';
            if (!fs.existsSync(path)) {
              core.info('no linkcheck report; nothing to file');
              return;
            }
            const data = JSON.parse(fs.readFileSync(path, 'utf-8'));
            const broken = (data.results || []).filter(r => r.status === 'BROKEN');
            if (broken.length === 0) {
              core.info('no broken links; nothing to file');
              return;
            }
            const { owner, repo } = context.repo;
            for (const r of broken) {
              const title = `[stale-link] ${r.title || r.link}`;
              const body = [
                `Node: \`${r.node}\``,
                `Link: ${r.link}`,
                `HTTP code: ${r.http_code ?? 'request error'}`,
                ``,
                `Filed automatically by the nightly linkcheck. See \`.github/workflows/linkcheck.yml\`.`,
              ].join('\n');
              // dedup: search for an existing open issue with the same title
              const existing = await github.rest.search.issuesAndPullRequests({
                q: `repo:${owner}/${repo} is:issue is:open in:title "${title.replace(/"/g, '\\"')}"`,
              });
              if (existing.data.total_count > 0) {
                core.info(`already open: ${title}`);
                continue;
              }
              await github.rest.issues.create({
                owner, repo, title, body,
                labels: ['stale-link', 'automated'],
              });
              core.info(`opened: ${title}`);
            }
