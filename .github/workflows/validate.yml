name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: pip install -r tools/requirements.txt
      - name: Validate roadmap-data
        run: python tools/validate_data.py
      - name: Generate graph.json + content/
        run: python tools/build.py
      - name: Check no source file > 500 lines
        shell: bash
        run: |
          set -e
          # Excludes site/src/data/ (generated graph.json) and content/ (generated markdown).
          violators=$(find roadmap-data tools site/src -type f \
            \( -name "*.py" -o -name "*.ts" -o -name "*.tsx" -o -name "*.yml" -o -name "*.json" \) \
            -not -path "site/src/data/*" \
            -exec sh -c 'lc=$(wc -l <"$1"); if [ "$lc" -gt 500 ]; then echo "$1:$lc"; fi' _ {} \; || true)
          if [ -n "$violators" ]; then
            echo "files >500 lines:"
            echo "$violators"
            exit 1
          fi

  build-site:
    runs-on: ubuntu-latest
    needs: validate-data
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: pip install -r tools/requirements.txt
      - run: python tools/build.py
      - run: npm ci
        working-directory: site
      - run: npm run typecheck --if-present
        working-directory: site
      - run: npm run build
        working-directory: site
